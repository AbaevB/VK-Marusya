<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    var path = window.location.pathname;
    var newPath = '/marusia/' + path;
    if (!path.startsWith('/marusia/')) {
      window.location.replace(newPath + (window.location.search || '') + (window.location.hash || ''));
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
