    <title>VK Маруся</title>
    <script>
      // Восстановление пути после редиректа с 404
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect) {
          // Небольшая задержка чтобы Vue успел загрузиться
          setTimeout(function() {
            // Используем hash роутинг
            window.location.hash = redirect;
          }, 100);
        }
      })();
    </script>
